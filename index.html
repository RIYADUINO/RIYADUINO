<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIYADUINO | Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="background-animation" id="bg-animation"></div>
    <div class="lines-background"></div>

    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">RIYADUINO</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link" data-translate="navHome">Home</a>
            <a href="index.html#about" class="nav-link" data-translate="navAbout">About Us</a>
            <a href="store.html" class="nav-link active" data-translate="navShowcase">Project Showcase</a>
        </div>
        <div class="nav-utils">
             <button class="util-btn" id="customProjectBtn" data-translate="customProjectBtn"><span>Custom Project</span></button>
             <button class="util-btn" id="translateBtn" aria-label="Toggle language">العربية</button>
        </div>
    </nav>

    <main class="store-page">
        <section id="store-hero" class="content-section" style="padding: 3rem 2rem;">
            <h2 data-translate="showcaseTitle">Project Showcase</h2>
            <div class="search-bar">
                <input id="searchInput" type="text" data-translate-placeholder="searchInputPlaceholder" placeholder="Search projects...">
            </div>
        </section>

        <section id="store-grid-container" style="padding: 0;">
            <div class="store-grid" id="storeGrid">
                </div>
        </section>
    </main>

    <div class="modal-overlay" id="productDetailModal" aria-hidden="true">
        <div class="modal-content product-detail-content">
            <button class="close-modal" id="closeDetailModalBtn" title="Close">×</button>
            <img id="detailImg" src="" alt="Product Image">
            <h3 id="detailTitle"></h3>
            <p id="detailDescription"></p>
            <h4 data-translate="componentsTitle">Key Components</h4>
            <ul id="detailComponentsList"></ul>
            </div>
    </div>
    
    <footer class="site-footer">
        <p>&copy; 2025 RIYADUINO. Empowering innovators in Saudi Arabia.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
