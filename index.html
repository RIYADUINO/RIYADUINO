
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIYADUINO | Membership Discount Application</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Official RIYADUINO Variables --- */
        :root {
            --bg-color: #000000;
            --surface-color: #111111;
            --primary-text: #FFFFFF;
            --secondary-text: #a0a0a0;
            --accent-yellow: #FFC300;
            --accent-glow: rgba(255, 195, 0, 0.4);
            --accent-glow-strong: rgba(255, 195, 0, 0.6);
            --border-color: rgba(255, 195, 0, 0.2);
            --form-input-bg: #0A0A0A;
            --font-heading: 'Archivo', sans-serif;
            --font-body: 'Tajawal', sans-serif;
        }

        /* --- Custom Keyframe Animations (Copied from template) --- */
        @keyframes subtle-yellow-pulse {
            0% {
                color: var(--accent-yellow);
                text-shadow: 0 0 8px var(--accent-glow);
            }
            50% {
                color: #fff2cc; 
                text-shadow: 0 0 16px var(--accent-glow-strong);
            }
            100% {
                color: var(--accent-yellow);
                text-shadow: 0 0 8px var(--accent-glow);
            }
        }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* NEW: Subtle 'Coming Soon' Pulse */
        @keyframes comingSoonPulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* --- Base & Layout --- */
        body {
            background-color: var(--bg-color);
            color: var(--primary-text);
            font-family: var(--font-body);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 600px;
            opacity: 0;
            animation: slideInUp 1s ease-out forwards;
        }

        /* --- Header Styling --- */
        h1 {
            font-family: var(--font-heading);
            text-align: center;
            color: var(--primary-text);
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        h1 span {
            color: var(--accent-yellow);
            animation: subtle-yellow-pulse 3s infinite alternate ease-in-out;
        }
        
        /* NEW: Coming Soon Style */
        .coming-soon {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--accent-yellow);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--accent-glow);
            animation: comingSoonPulse 1.5s infinite alternate;
        }

        p.subtitle {
            font-family: var(--font-body);
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 400;
            color: var(--secondary-text);
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 20px;
            padding: 15px;
            background-color: rgba(17, 17, 17, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            animation: slideInUp 0.6s ease-out forwards;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }
        .form-group:nth-child(3) { animation-delay: 0.5s; }
        .form-group:nth-child(4) { animation-delay: 0.6s; }
        .form-group:nth-child(5) { animation-delay: 0.7s; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-family: var(--font-body);
            color: var(--secondary-text);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="email"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--form-input-bg);
            color: var(--primary-text);
            box-sizing: border-box;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus, input[type="email"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-yellow);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        select option {
            background-color: var(--surface-color);
            color: var(--primary-text);
        }

        /* --- Submit Button (CTA-Button Style) --- */
        .cta-button {
            display: block;
            width: 100%;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.15rem;
            text-decoration: none;
            color: var(--bg-color);
            background: var(--accent-yellow);
            padding: 1rem 0;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 195, 0, 0.2);
            margin-top: 30px;
            opacity: 0;
            animation: slideInUp 0.8s ease-out 0.8s forwards;
        }

        .cta-button:hover {
            transform: translateY(-3px) scale(1.01);
            background-color: #ffe680;
            box-shadow: 0 8px 30px var(--accent-glow-strong);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>RIYAD<span>UINO</span></h1>
        
        <p class="coming-soon">
            MEMBERSHIP REGISTRATION COMING SOON
        </p>

        <p class="subtitle">
            Secure your exclusive 10% lifetime discount by applying now. Share your interest below!
        </p>

        <form action="https://formspree.io/f/xzzkyzzp" method="POST">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="email">Primary Contact Email</label>
                <input type="email" id="email" name="email" required placeholder="your.professional.email@example.com">
            </div>

            <div class="form-group">
                <label for="interest_level">Expertise Level</label>
                <select id="interest_level" name="interest_level" required>
                    <option value="">-- Select your expertise level --</option>
                    <option value="novice">Novice (Exploring fundamentals)</option>
                    <option value="intermediate">Intermediate (Building small projects)</option>
                    <option value="advanced">Advanced (Developing complex systems)</option>
                    <option value="expert">Expert (Consulting/Teaching)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="goals">Key Objectives with RIYADUINO Technology</label>
                <textarea id="goals" name="goals" required placeholder="Briefly describe what you aim to achieve..."></textarea>
            </div>
            
            <button type="submit" class="cta-button">
                SUBMIT & SECURE MY 10% DISCOUNT
            </button>
        </form>
    </div>

</body>
</html>
